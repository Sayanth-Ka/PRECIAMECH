<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Preciamech</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='uploads/logo.jpg') }}" alt="Preciamech" style="height:64px;width:auto;margin:0 auto;display:block;">
      <h1>Preciamech</h1>
      <p>Admin Panel — Sign In</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control"
               placeholder="admin@preciamech.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;margin-top:.75rem;">Sign In →</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;">
      <a href="{{ url_for('index') }}" style="color:var(--muted);font-size:.85rem;">← Back to Website</a>
    </p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
