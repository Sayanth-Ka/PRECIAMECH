<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if action == 'new' %}
            Add Employee
        {% else %}
            Edit Employee
        {% endif %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="admin-layout">

    <aside class="admin-sidebar">

        <div class="sidebar-brand">
            <div>Preciamech</div>
            <small>Admin Panel</small>
        </div>

        <nav class="sidebar-nav">

    <a href="{{ url_for('admin_dashboard') }}" class="active">
        <span>📊</span> Dashboard
    </a>

    <a href="{{ url_for('admin_project_new') }}">
        <span>➕</span> Add Project
    </a>

    <a href="{{ url_for('admin_employees') }}">
        <span>👨‍💼</span> Employees
    </a>

    <a href="{{ url_for('admin_employee_new') }}">
        <span>👤</span> Add Employee
    </a>

    <a href="{{ url_for('index') }}" target="_blank">
        <span>🌐</span> View Website
    </a>

    <a href="{{ url_for('admin_logout') }}" style="margin-top:2rem;">
        <span>🚪</span> Sign Out
    </a>

</nav>

    </aside>

    <div class="admin-main">

        <div class="admin-topbar">

            <h1>
                {% if action == 'new' %}
                    Add Employee
                {% else %}
                    Edit Employee
                {% endif %}
            </h1>

        </div>

        <div class="admin-content">

            <form method="POST"
                  enctype="multipart/form-data"
                  class="form-card">

                <div class="form-grid">

                    <div class="form-group form-full">
                        <label>Name</label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ employee.name if employee else '' }}"
                               required>
                    </div>

                    <div class="form-group">

                        <label>Category</label>

                        <select name="category"
                                class="form-control">

                            <option value="senior_manager"
                            {% if employee and employee.category=="senior_manager" %}
                            selected
                            {% endif %}>
                                Senior Manager
                            </option>

                            <option value="manager"
                            {% if employee and employee.category=="manager" %}
                            selected
                            {% endif %}>
                                Manager
                            </option>

                            <option value="designer"
                            {% if employee and employee.category=="designer" %}
                            selected
                            {% endif %}>
                                Designer
                            </option>

                            <option value="engineer"
                            {% if employee and employee.category=="engineer" %}
                            selected
                            {% endif %}>
                                Engineer
                            </option>

                        </select>

                    </div>

                    <div class="form-group">
                        <label>Qualification</label>

                        <input type="text"
                               name="qualification"
                               class="form-control"
                               value="{{ employee.qualification if employee else '' }}">
                    </div>

                    <div class="form-group">
                        <label>Experience</label>

                        <input type="text"
                               name="experience"
                               class="form-control"
                               placeholder="15 Years"
                               value="{{ employee.experience if employee else '' }}">
                    </div>

                    <div class="form-group">
                        <label>Phone</label>

                        <input type="text"
                               name="phone"
                               class="form-control"
                               value="{{ employee.phone if employee else '' }}">
                    </div>

                    <div class="form-group">
                        <label>Email</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ employee.email if employee else '' }}">
                    </div>

                    <div class="form-group form-full">

                        <label>Description</label>

                        <textarea name="description"
                                  class="form-control"
                                  rows="5">{{ employee.description if employee else '' }}</textarea>

                    </div>

                    <div class="form-group form-full">

                        <label>Photo</label>

                        {% if employee and employee.image_filename %}

                            <img src="{{ url_for('static', filename='uploads/' + employee.image_filename) }}"
                                 width="150"
                                 style="margin-bottom:15px;border-radius:10px;">

                        {% endif %}

                        <input type="file"
                               name="image"
                               class="form-control">

                    </div>

                </div>

                <br>

                <button class="btn btn-primary">

                    {% if action == 'new' %}
                        Add Employee
                    {% else %}
                        Save Changes
                    {% endif %}

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
